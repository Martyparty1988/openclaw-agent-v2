<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#060d09">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Martybot</title>
  <meta http-equiv="refresh" content="0; url=/web/">
  <style>
    :root{color-scheme:dark;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;--bg:#060d09;--green:#2eff70;--text:#dffae6;--muted:rgba(223,250,230,.58)}
    *{box-sizing:border-box}html,body{height:100%}body{margin:0;display:grid;place-items:center;background:radial-gradient(circle at 20% 0,rgba(46,255,112,.18),transparent 24rem),var(--bg);color:var(--text);padding:24px;text-align:center}
    .card{width:min(420px,100%);padding:28px;border:1px solid rgba(46,255,112,.18);border-radius:24px;background:rgba(255,255,255,.045);box-shadow:0 24px 80px rgba(0,0,0,.45);backdrop-filter:blur(20px)}
    .logo{font-size:48px;margin-bottom:10px}h1{margin:0 0 8px;font-size:28px;letter-spacing:-.04em}p{margin:0 0 20px;color:var(--muted);line-height:1.5}a{display:inline-block;padding:12px 18px;border-radius:14px;background:linear-gradient(135deg,var(--green),#80ffb0);color:#041008;text-decoration:none;font-weight:800}
  </style>
  <script>location.replace('/web/');</script>
</head>
<body>
  <main class="card">
    <div class="logo">🤖</div>
    <h1>Martybot</h1>
    <p>Přesměrovávám do aplikace…</p>
    <a href="/web/">Otevřít Martybot</a>
  </main>
</body>
</html>
