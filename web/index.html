<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenClaw Control Panel</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #0e1116; color: #e8f2ff; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 24px; }
    h1 { margin-bottom: 6px; }
    .muted { color: #9fb3c8; margin-bottom: 16px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .panel { background: #151b24; border: 1px solid #263140; border-radius: 10px; padding: 12px; }
    input, textarea, button { width: 100%; box-sizing: border-box; border-radius: 8px; border: 1px solid #324256; background: #0f151d; color: #ecf5ff; padding: 10px; }
    textarea { min-height: 120px; resize: vertical; }
    button { cursor: pointer; background: #1f7ae0; border: none; font-weight: 700; }
    button.secondary { background: #2d3642; }
    .quick { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    #log { white-space: pre-wrap; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; min-height: 320px; max-height: 520px; overflow: auto; }
    .badge { display: inline-block; background: #1a2636; border: 1px solid #324256; padding: 2px 8px; border-radius: 999px; font-size: 12px; }
    @media (max-width: 900px){ .grid { grid-template-columns: 1fr; } .quick{grid-template-columns: 1fr 1fr;} }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🤖 OpenClaw Control Panel</h1>
    <p class="muted">Ovládání agenta přes web. Pro Vercel nastav Backend API URL na Railway doménu backendu. Můžeš plánovat úkoly, spouštět exekuci, QA i ukončení všech úloh.</p>

    <div class="grid">
      <div class="panel">
        <label>User ID</label>
        <input id="userId" value="web_admin" />
        <label style="margin-top:10px;display:block;">Backend API URL</label>
        <input id="apiBase" placeholder="https://openclaw-api.up.railway.app" />
        <label style="margin-top:10px;display:block;">Příkaz</label>
        <textarea id="message" placeholder="Např. execute oprav router a zkontroluj testy"></textarea>
        <div style="margin-top:8px;"><button id="sendBtn">Odeslat</button></div>
        <div style="margin-top:8px;"><button class="secondary" id="clearBtn">Vymazat výstup</button></div>

        <h3>Rychlé akce</h3>
        <div class="quick">
          <button class="secondary" data-cmd="help">help</button>
          <button class="secondary" data-cmd="plan Vytvoř release plán">plan</button>
          <button class="secondary" data-cmd="qa">qa</button>
          <button class="secondary" data-cmd="tasks">tasks</button>
          <button class="secondary" data-cmd="done all">ukonči vše</button>
          <button class="secondary" data-cmd="web improve">web improve</button>
        </div>
      </div>

      <div class="panel">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <strong>Výstup agenta</strong><span class="badge" id="status">idle</span>
        </div>
        <div id="log"></div>
      </div>
    </div>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const logEl = document.getElementById('log');
    const userIdEl = document.getElementById('userId');
    const msgEl = document.getElementById('message');
    const apiBaseEl = document.getElementById('apiBase');

    const storedApiBase = localStorage.getItem('openclaw_api_base') || '';
    apiBaseEl.value = storedApiBase;

    function append(text) {
      const now = new Date().toLocaleTimeString();
      logEl.textContent += `[${now}] ${text}\n\n`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    async function sendCommand(cmdOverride) {
      const text = cmdOverride || msgEl.value.trim();
      if (!text) return;

      statusEl.textContent = 'running';
      append(`> ${text}`);

      try {
        const base = (apiBaseEl.value || '').trim().replace(/\/$/, '');
        if (base) localStorage.setItem('openclaw_api_base', base);
        const endpoint = `${base || ''}/api/message`;

        const response = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: userIdEl.value.trim(), text }),
        });

        const data = await response.json();
        if (!response.ok || !data.ok) {
          append(`ERROR: ${data.error || 'Unknown error'}`);
        } else {
          (data.replies || []).forEach((msg) => append(msg));
        }
      } catch (error) {
        append(`NETWORK ERROR: ${error.message}`);
      } finally {
        statusEl.textContent = 'idle';
      }
    }

    document.getElementById('sendBtn').addEventListener('click', () => sendCommand());
    document.getElementById('clearBtn').addEventListener('click', () => { logEl.textContent = ''; });
    document.querySelectorAll('[data-cmd]').forEach((btn) => {
      btn.addEventListener('click', () => sendCommand(btn.dataset.cmd));
    });
  </script>
</body>
</html>
