  <style>
    :root{--bg:#060d09;--green:#2eff70;--green2:#16d95b;--blue:#5cb8ff;--red:#ff4d6d;--yellow:#ffcf5c;--text:#eefcf2;--muted:rgba(238,252,242,.62);--faint:rgba(238,252,242,.34);--line:rgba(255,255,255,.11);--glass:rgba(255,255,255,.075);--glass2:rgba(255,255,255,.045);--shadow:0 24px 80px rgba(0,0,0,.5);--tabh:84px;--body:Figtree,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;--tech:"Chakra Petch",system-ui,sans-serif;--mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:var(--body);overflow-x:hidden}body{min-height:100svh;background:radial-gradient(circle at 12% -8%,rgba(46,255,112,.24),transparent 34%),radial-gradient(circle at 92% 1%,rgba(92,184,255,.18),transparent 32%),radial-gradient(circle at 50% 108%,rgba(46,255,112,.12),transparent 36%),#060d09}body:before{content:"";position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(46,255,112,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(46,255,112,.035) 1px,transparent 1px);background-size:34px 34px;mask-image:radial-gradient(circle at center,#000,transparent 78%);z-index:0}body:after{content:"";position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent 0 3px,rgba(255,255,255,.018) 3px 4px);opacity:.55;z-index:1}button,input,textarea{font:inherit}button{color:inherit;border:0;cursor:pointer;touch-action:manipulation}.app{position:relative;z-index:2;width:min(100%,620px);min-height:100svh;margin:0 auto;padding:calc(env(safe-area-inset-top) + 12px) 14px calc(var(--tabh) + env(safe-area-inset-bottom) + 18px)}.glass{background:linear-gradient(180deg,rgba(255,255,255,.105),rgba(255,255,255,.045));border:1px solid rgba(255,255,255,.12);box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.11);backdrop-filter:blur(26px) saturate(180%);-webkit-backdrop-filter:blur(26px) saturate(180%)}.topbar{position:sticky;top:calc(env(safe-area-inset-top) + 8px);z-index:20;border-radius:28px;padding:14px;margin-bottom:14px}.brandrow{display:grid;grid-template-columns:48px 1fr auto;gap:12px;align-items:center}.avatar{width:48px;height:48px;border-radius:18px;display:grid;place-items:center;color:#031007;background:radial-gradient(circle at 30% 20%,#fff 0 8%,transparent 9%),linear-gradient(135deg,var(--green),#96ffb2 52%,var(--blue));box-shadow:0 0 34px rgba(46,255,112,.24);font-family:var(--tech);font-weight:700}.brand h1{margin:0;font-family:var(--tech);font-size:22px;line-height:1}.brand p{margin:5px 0 0;color:var(--muted);font-size:13px}.badge{min-height:36px;padding:8px 11px;border-radius:999px;display:inline-flex;align-items:center;gap:7px;border:1px solid rgba(46,255,112,.22);background:rgba(46,255,112,.095);color:var(--green);font-family:var(--mono);font-size:11px;white-space:nowrap}.badge.offline{color:var(--red);border-color:rgba(255,77,109,.28);background:rgba(255,77,109,.09)}.badge.checking{color:var(--yellow);border-color:rgba(255,207,92,.32);background:rgba(255,207,92,.08)}.dot{width:8px;height:8px;border-radius:999px;background:currentColor;box-shadow:0 0 14px currentColor;animation:pulse 1.8s infinite}@keyframes pulse{50%{opacity:.42;transform:scale(.72)}}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-top:14px}.stat{min-height:64px;border-radius:18px;padding:11px;background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.075)}.stat .label{color:var(--faint);font-size:11px;letter-spacing:.08em;text-transform:uppercase}.stat .value{margin-top:6px;font-family:var(--mono);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.view{display:none;animation:viewin .22s ease-out both}.view.active{display:block}@keyframes viewin{from{opacity:0;transform:translateY(8px)}}.panel{border-radius:28px;padding:14px}.chatpanel{min-height:calc(100svh - 300px);display:flex;flex-direction:column;gap:12px}.messages{min-height:340px;max-height:calc(100svh - 386px);overflow-y:auto;overscroll-behavior:contain;padding:4px 2px 6px;scroll-behavior:smooth}.msg{display:flex;margin:10px 0}.msg.user{justify-content:flex-end}.msg.bot,.msg.system{justify-content:flex-start}.bubble{max-width:87%;border-radius:22px;padding:12px 14px;word-break:break-word;box-shadow:0 12px 28px rgba(0,0,0,.22)}.user .bubble{color:#041208;background:linear-gradient(135deg,var(--green),#b7ffc8);border-bottom-right-radius:8px}.bot .bubble{background:rgba(255,255,255,.075);border:1px solid rgba(255,255,255,.1);border-bottom-left-radius:8px;backdrop-filter:blur(18px)}.system{justify-content:center}.system .bubble{max-width:94%;padding:8px 12px;border-radius:999px;background:rgba(92,184,255,.08);border:1px solid rgba(92,184,255,.14);color:var(--muted);font-size:12px;text-align:center;box-shadow:none}.content{font-size:14px;line-height:1.45}.content p{margin:0 0 9px}.content p:last-child{margin-bottom:0}.content h1,.content h2,.content h3{margin:8px 0;font-family:var(--tech);line-height:1.15}.content h1{font-size:19px}.content h2{font-size:17px}.content h3{font-size:15px}.content ul{margin:8px 0 8px 18px;padding:0}.content li{margin:4px 0}.content blockquote{margin:8px 0;padding:8px 10px;border-left:3px solid var(--green);background:rgba(46,255,112,.07);border-radius:12px;color:var(--muted)}.content code{font-family:var(--mono);font-size:.92em;padding:2px 5px;border-radius:7px;background:rgba(0,0,0,.3);color:#b7ffc8}.content pre{overflow-x:auto;padding:11px;border-radius:15px;background:rgba(0,0,0,.38);border:1px solid rgba(255,255,255,.1)}.content pre code{padding:0;background:transparent}.content a{color:var(--blue);text-decoration:none;border-bottom:1px solid rgba(92,184,255,.35)}.time{margin-top:7px;font-family:var(--mono);font-size:10px;opacity:.48;text-align:right}.typing{display:none;width:fit-content;gap:5px;align-items:center;margin:3px 0 0 8px;color:var(--muted);font-size:12px}.typing.active{display:flex}.typing i{width:6px;height:6px;border-radius:99px;background:var(--green);animation:td 1s infinite}.typing i:nth-child(2){animation-delay:.16s}.typing i:nth-child(3){animation-delay:.32s}@keyframes td{50%{opacity:1;transform:translateY(-4px)}0%,100%{opacity:.25}}.quick{display:flex;gap:8px;overflow-x:auto;padding:3px 1px 9px;scrollbar-width:none}.quick::-webkit-scrollbar{display:none}.chip{min-height:36px;flex:0 0 auto;border:1px solid rgba(46,255,112,.2);background:rgba(46,255,112,.075);color:var(--green);border-radius:999px;padding:8px 12px;font-family:var(--mono);font-size:12px}.composer{display:grid;grid-template-columns:1fr 46px 58px;gap:8px;align-items:end;padding:10px;border-radius:24px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.1)}textarea{width:100%;min-height:44px;max-height:150px;resize:none;border:0;outline:0;border-radius:18px;padding:12px 13px;color:var(--text);background:rgba(255,255,255,.075);line-height:1.35}.iconbtn,.sendbtn{min-height:44px;border-radius:16px;display:grid;place-items:center}.iconbtn{background:rgba(255,255,255,.075);border:1px solid rgba(255,255,255,.1)}.sendbtn{background:linear-gradient(135deg,var(--green),#b7ffc8);color:#031007;font-weight:700}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.action{min-height:124px;border:1px solid rgba(255,255,255,.1);border-radius:23px;padding:14px;text-align:left;background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.035));box-shadow:0 16px 34px rgba(0,0,0,.26)}.action:active{transform:scale(.975)}.aicon{width:42px;height:42px;display:grid;place-items:center;border-radius:16px;background:rgba(46,255,112,.1);color:var(--green);font-size:20px;margin-bottom:12px}.action h3{margin:0;font-family:var(--tech);font-size:16px;line-height:1.1}.action p{margin:7px 0 0;color:var(--muted);font-size:12px;line-height:1.35}.stack{display:grid;gap:12px}.title2{margin:0 0 10px;font-family:var(--tech);font-size:19px}.card{border-radius:24px;padding:14px;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.1)}.field{display:grid;gap:7px;margin:12px 0}.field label{color:var(--muted);font-size:12px}.field input{width:100%;min-height:44px;border:1px solid rgba(255,255,255,.1);border-radius:16px;outline:0;padding:11px 12px;color:var(--text);background:rgba(0,0,0,.24);font-family:var(--mono);font-size:13px}.btnrow{display:flex;gap:9px;flex-wrap:wrap;margin-top:10px}.settingsbtn{min-height:42px;border:1px solid rgba(46,255,112,.24);border-radius:15px;padding:10px 12px;background:rgba(46,255,112,.08);color:var(--green);font-weight:700}.settingsbtn.secondary{border-color:rgba(92,184,255,.22);background:rgba(92,184,255,.08);color:var(--blue)}.details{margin-top:12px;padding:12px;border-radius:16px;background:rgba(0,0,0,.24);border:1px solid rgba(255,255,255,.08);font-family:var(--mono);color:var(--muted);font-size:12px;white-space:pre-wrap;overflow-x:auto}.model{display:flex;justify-content:space-between;gap:10px;align-items:center;min-height:44px;border-radius:16px;padding:10px 12px;background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.08);font-family:var(--mono);font-size:12px;margin-top:8px}.model button{border-radius:12px;padding:8px 10px;background:rgba(46,255,112,.12);color:var(--green);font-family:var(--mono);font-size:11px}.switchrow{display:flex;justify-content:space-between;align-items:center;gap:12px;min-height:50px;border-bottom:1px solid rgba(255,255,255,.08)}.switchrow:last-child{border-bottom:0}.switchrow strong{display:block;font-size:14px}.switchrow small{color:var(--muted);font-size:12px}.switch{position:relative;width:52px;height:31px;flex:0 0 auto}.switch input{display:none}.slider{position:absolute;inset:0;border-radius:999px;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.1)}.slider:before{content:"";position:absolute;width:25px;height:25px;left:2px;top:2px;border-radius:50%;background:rgba(255,255,255,.72);transition:.18s}.switch input:checked+.slider{background:rgba(46,255,112,.28);border-color:rgba(46,255,112,.4)}.switch input:checked+.slider:before{transform:translateX(21px);background:var(--green);box-shadow:0 0 24px rgba(46,255,112,.32)}.tabbar{position:fixed;z-index:40;left:50%;bottom:calc(env(safe-area-inset-bottom) + 12px);transform:translateX(-50%);width:min(calc(100% - 24px),594px);height:74px;border-radius:28px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:8px}.tabbar button{border-radius:21px;background:transparent;color:var(--muted);display:grid;place-items:center;gap:3px;font-size:11px;font-weight:700}.tabbar button span{font-size:19px}.tabbar button.active{color:#041208;background:linear-gradient(135deg,var(--green),#b7ffc8);box-shadow:0 0 34px rgba(46,255,112,.22)}.empty{color:var(--muted);padding:14px;border:1px dashed rgba(255,255,255,.16);border-radius:20px;text-align:center;font-size:13px}@media(max-width:360px){.brand h1{font-size:19px}.brand p,.stat .value{font-size:11px}.grid{grid-template-columns:1fr}.composer{grid-template-columns:1fr 44px 52px}}
  </style>

<body>
  <main class="app">
    <header class="topbar glass">
      <div class="brandrow"><div class="avatar">M</div><div class="brand"><h1>Martybot</h1><p>agent control · iPhone PWA</p></div><div id="badge" class="badge offline"><span class="dot"></span><span id="badgeText">Offline</span></div></div>
      <section class="stats"><div class="stat"><div class="label">Backend</div><div class="value" id="statBackend">nenastaven</div></div><div class="stat"><div class="label">Model</div><div class="value" id="statModel">—</div></div><div class="stat"><div class="label">Provider</div><div class="value" id="statProvider">—</div></div><div class="stat"><div class="label">Auto</div><div class="value" id="statAuto">—</div></div></section>
    </header>
    <section id="view-chat" class="view active"><div class="panel glass chatpanel"><div id="messages" class="messages" aria-live="polite"></div><div id="typing" class="typing"><i></i><i></i><i></i><strong>Martybot přemýšlí</strong></div><div class="quick" id="quick"><button class="chip" data-command="/status">/status</button><button class="chip" data-command="/agent">/agent</button><button class="chip" data-command="/agent web">/agent web</button><button class="chip" data-command="/auto code">/auto code</button><button class="chip" data-command="/git">/git</button><button class="chip" data-command="/proactive on">/proactive on</button></div><form class="composer" id="composer"><textarea id="input" rows="1" placeholder="Zpráva nebo příkaz…"></textarea><button class="iconbtn" id="mic" type="button" title="Diktovat">🎙️</button><button class="sendbtn" type="submit">➤</button></form></div></section>
    <section id="view-actions" class="view"><div class="panel glass"><h2 class="title2">Akce</h2><div class="grid" id="actions"></div></div></section>
    <section id="view-settings" class="view"><div class="panel glass stack"><h2 class="title2">Nastavení</h2><div class="card"><div class="field"><label for="backend">Backend URL</label><input id="backend" type="url" placeholder="https://tvuj-backend.up.railway.app"></div><div class="field"><label for="token">WEB_API_TOKEN</label><input id="token" type="password" placeholder="volitelné"></div><div class="btnrow"><button class="settingsbtn" id="save" type="button">Uložit a test</button><button class="settingsbtn secondary" id="test" type="button">Test spojení</button></div><div class="details" id="details">Backend zatím není otestovaný.</div></div><div class="card"><h3 class="title2">Modely</h3><div id="models"></div></div><div class="card"><div class="switchrow"><div><strong>Vibrace tlačítek</strong><small>Krátká haptika při kliknutí</small></div><label class="switch"><input id="haptics" type="checkbox"><span class="slider"></span></label></div><div class="switchrow"><div><strong>Ukládat chat</strong><small>Poslední konverzace v localStorage</small></div><label class="switch"><input id="savechat" type="checkbox"><span class="slider"></span></label></div></div></div></section>
  </main>
  <nav class="tabbar glass" aria-label="Hlavní navigace"><button class="active" data-tab="chat" type="button"><span>💬</span>Chat</button><button data-tab="actions" type="button"><span>⚡</span>Akce</button><button data-tab="settings" type="button"><span>⚙️</span>Nastavení</button></nav>
  <script>
    const LS={backend:'martybot.backendUrl',token:'martybot.webApiToken',chat:'martybot.chat',haptics:'martybot.haptics',saveChat:'martybot.saveChat'};
    const $=id=>document.getElementById(id);const state={backend:localStorage.getItem(LS.backend)||'',token:localStorage.getItem(LS.token)||'',haptics:localStorage.getItem(LS.haptics)!=='false',saveChat:localStorage.getItem(LS.saveChat)==='true',messages:[],status:null,busy:false};
    const el={badge:$('badge'),badgeText:$('badgeText'),statBackend:$('statBackend'),statModel:$('statModel'),statProvider:$('statProvider'),statAuto:$('statAuto'),messages:$('messages'),typing:$('typing'),composer:$('composer'),input:$('input'),mic:$('mic'),actions:$('actions'),backend:$('backend'),token:$('token'),save:$('save'),test:$('test'),details:$('details'),haptics:$('haptics'),savechat:$('savechat'),models:$('models')};
    const actions=[['🩺','Stav','Zobrazí aktuální stav bota','/status',1],['🧠','Paměť','Ukáže trvalou paměť','/facts',1],['🤖','Auto','Stav autonomního režimu','/auto',1],['🔍','Auto audit','Spustí kontrolu kódu','/auto code',1],['🧩','Git','Stav git workspace','/git',1],['🛠️','Git setup','Připraví git workspace','/git setup',1],['⬇️','Git pull','Aktualizuje workspace','/git pull',1],['📦','Záloha','Export paměti','/backup',1],['🧬','Improve','Self-improve cyklus','/improve',0],['❔','Help','Seznam příkazů','/help',1]];
    const models=[['Claude Sonnet','/model claude'],['OpenRouter Free','/model openrouter free'],['OpenRouter Qwen','/model openrouter qwen'],['DeepSeek Flash','/model deepseek flash'],['OpenAI Mini','/model openai mini']];
    function hap(){if(state.haptics&&'vibrate'in navigator)navigator.vibrate(8)}function t(){return new Date().toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'})}function norm(u){return String(u||'').trim().replace(/\/+$/,'')}function setState(type,text){el.badge.classList.remove('offline','checking');if(type==='offline')el.badge.classList.add('offline');if(type==='checking')el.badge.classList.add('checking');el.badgeText.textContent=text}function stats(){let b='nenastaven';try{b=state.backend?new URL(state.backend).host:'nenastaven'}catch{b='neplatná URL'}el.statBackend.textContent=b;el.statModel.textContent=state.status?.model||'—';el.statProvider.textContent=state.status?.provider||'—';el.statAuto.textContent=state.status?(state.status.auto?'zapnuto':'vypnuto'):'—'}
    function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}function safeLink(url,label){try{const p=new URL(url,location.href);if(!['http:','https:','mailto:','tel:'].includes(p.protocol))return esc(label||url);return `<a href="${esc(p.href)}" target="_blank" rel="noopener noreferrer">${esc(label||url)}</a>`}catch{return esc(label||url)}}
    function md(s){let text=String(s||''),blocks=[];text=text.replace(/```([\s\S]*?)```/g,(_,c)=>{let id='@@B'+blocks.length+'@@';blocks.push(`<pre><code>${esc(c.trim())}</code></pre>`);return id});text=esc(text).replace(/^### (.*)$/gm,'<h3>$1</h3>').replace(/^## (.*)$/gm,'<h2>$1</h2>').replace(/^# (.*)$/gm,'<h1>$1</h1>').replace(/^&gt; (.*)$/gm,'<blockquote>$1</blockquote>').replace(/^\s*[-*] (.*)$/gm,'<li>$1</li>').replace(/(<li>[\s\S]*?<\/li>)/g,'<ul>$1</ul>').replace(/<\/ul>\s*<ul>/g,'').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>').replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\[([^\]]+)\]\(([^)]+)\)/g,(_,l,u)=>safeLink(u,l)).replace(/\b(https?:\/\/[^\s<]+)\b/g,u=>safeLink(u,u));text=text.split(/\n{2,}/).map(p=>/^\s*<(h1|h2|h3|ul|blockquote|pre)/.test(p)?p:`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');blocks.forEach((h,i)=>text=text.replace('@@B'+i+'@@',h));return text}
    function add(role,content,save=true){state.messages.push({id:crypto.randomUUID?crypto.randomUUID():String(Date.now()+Math.random()),role,content,time:t()});render();if(save&&state.saveChat)localStorage.setItem(LS.chat,JSON.stringify(state.messages.slice(-80)))}function render(){el.messages.innerHTML='';if(!state.messages.length){let d=document.createElement('div');d.className='empty';d.textContent=state.backend?'Napiš zprávu nebo použij rychlý příkaz.':'Nejdřív nastav Backend URL v Nastavení.';el.messages.appendChild(d);return}for(const m of state.messages){let w=document.createElement('div');w.className='msg '+m.role;let b=document.createElement('div');b.className='bubble';let c=document.createElement('div');c.className='content';if(m.role==='bot')c.innerHTML=md(m.content);else c.textContent=m.content;let ti=document.createElement('div');ti.className='time';ti.textContent=m.time;b.append(c,ti);w.appendChild(b);el.messages.appendChild(w)}el.messages.scrollTop=el.messages.scrollHeight}
    function headers(){const h={'Content-Type':'application/json'};if(state.token)h.Authorization='Bearer '+state.token;return h}async function refresh(){if(!state.backend){state.status=null;setState('offline','Offline');stats();el.details.textContent='Backend URL není nastavená.';return}setState('checking','Kontroluji');try{const r=await fetch(state.backend+'/api/status',{headers:headers()});const d=await r.json();if(!r.ok||d.ok===false)throw new Error(d.error||'HTTP '+r.status);state.status=d;setState('online','Online');el.details.textContent=JSON.stringify(d,null,2)}catch(e){state.status=null;setState('offline','Offline');el.details.textContent='Spojení selhalo:\n'+e.message}stats()}
    async function send(text){const clean=String(text||'').trim();if(!clean||state.busy)return;hap();if(!state.backend){add('system','Backend URL není nastavená. Otevři Nastavení a vlož Railway URL.');showTab('settings');return}state.busy=true;add('user',clean);el.typing.classList.add('active');try{const r=await fetch(state.backend+'/api/chat',{method:'POST',headers:headers(),body:JSON.stringify({text:clean,userId:'web_user'})});const d=await r.json().catch(()=>({}));if(!r.ok||d.ok===false)throw new Error(d.error||'HTTP '+r.status);const replies=Array.isArray(d.replies)?d.replies:[d.reply||d.message||'Bez odpovědi.'];replies.forEach(x=>add('bot',x));await refresh()}catch(e){add('system','Chyba spojení: '+e.message);setState('offline','Offline')}finally{state.busy=false;el.typing.classList.remove('active')}}function autoSize(){el.input.style.height='auto';el.input.style.height=Math.min(el.input.scrollHeight,150)+'px'}function fillOrSend(cmd,doSend=true){hap();showTab('chat');if(doSend)send(cmd);else{el.input.value=cmd;autoSize();el.input.focus()}}
    function showTab(name){document.querySelectorAll('.tabbar button').forEach(b=>b.classList.toggle('active',b.dataset.tab===name));document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));const v=document.getElementById('view-'+name);if(v)v.classList.add('active');if(name==='chat')setTimeout(()=>{const m=document.getElementById('messages');if(m)m.scrollTop=m.scrollHeight},60);hap()}
    function saveSettings(){state.backend=norm(el.backend.value);state.token=el.token.value.trim();state.haptics=el.haptics.checked;state.saveChat=el.savechat.checked;localStorage.setItem(LS.backend,state.backend);localStorage.setItem(LS.token,state.token);localStorage.setItem(LS.haptics,String(state.haptics));localStorage.setItem(LS.saveChat,String(state.saveChat));if(!state.saveChat)localStorage.removeItem(LS.chat);refresh()}
    function init(){el.backend.value=state.backend;el.token.value=state.token;el.haptics.checked=state.haptics;el.savechat.checked=state.saveChat;document.querySelectorAll('.tabbar button').forEach(b=>b.onclick=()=>showTab(b.dataset.tab));document.querySelectorAll('[data-command]').forEach(b=>b.onclick=()=>fillOrSend(b.dataset.command,true));el.actions.innerHTML=actions.map(a=>`<button class="action" data-cmd="${esc(a[3])}" data-send="${a[4]}"><div class="aicon">${a[0]}</div><h3>${esc(a[1])}</h3><p>${esc(a[2])}</p></button>`).join('');el.actions.querySelectorAll('button').forEach(b=>b.onclick=()=>fillOrSend(b.dataset.cmd,b.dataset.send==='1'));el.models.innerHTML=models.map(m=>`<div class="model"><span>${esc(m[0])}</span><button data-cmd="${esc(m[1])}">Použít</button></div>`).join('');el.models.querySelectorAll('button').forEach(b=>b.onclick=()=>fillOrSend(b.dataset.cmd,true));el.save.onclick=saveSettings;el.test.onclick=()=>{state.backend=norm(el.backend.value);state.token=el.token.value.trim();refresh()};el.haptics.onchange=saveSettings;el.savechat.onchange=saveSettings;el.composer.onsubmit=e=>{e.preventDefault();const text=el.input.value;el.input.value='';autoSize();send(text)};el.input.oninput=autoSize;el.input.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();el.composer.requestSubmit()}};const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR)el.mic.hidden=true;else{const rec=new SR();rec.lang='cs-CZ';rec.interimResults=false;rec.continuous=false;rec.onresult=e=>{const tx=e.results?.[0]?.[0]?.transcript||'';el.input.value=(el.input.value+' '+tx).trim();autoSize();el.input.focus()};el.mic.onclick=()=>{hap();rec.start()}}try{if(state.saveChat)state.messages=JSON.parse(localStorage.getItem(LS.chat)||'[]')}catch{}if(!state.messages.length){add('system','Martybot PWA připravená.');if(!state.backend)add('system','Backend není nastavený. Jdi do Nastavení a vlož Railway URL.');else add('bot','**Ahoj Marty.** Jsem připravený. Zkus `/status`, `/agent web` nebo `/auto code`.')}render();stats();refresh();if('serviceWorker'in navigator)window.addEventListener('load',()=>{navigator.serviceWorker.register('/web/service-worker.js').then(()=>console.log('Service Worker registered')).catch(err=>{console.warn('Service Worker /web failed:',err);navigator.serviceWorker.register('/service-worker.js').then(()=>console.log('Root Service Worker registered')).catch(e=>console.warn('Service Worker failed:',e))})})}
    init();
  </script>
</body>
