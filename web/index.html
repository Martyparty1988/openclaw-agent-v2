<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <title>Martybot OS</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon: #3dff7a;
            --bg: #050a05;
            --glass: rgba(255, 255, 255, 0.03);
        }
        
        body {
            background: var(--bg);
            color: white;
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Glassmorphism */
        .glass {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(61, 255, 122, 0.1);
        }

        .neon-text {
            color: var(--neon);
            text-shadow: 0 0 10px rgba(61, 255, 122, 0.5);
        }

        /* Sekce - SPA logika */
        .page-section {
            display: none;
            height: 100%;
            overflow-y: auto;
            padding-bottom: 100px; /* Space for nav */
        }
        .page-section.active {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Custom Scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Bottom Nav Active State */
        .nav-item.active {
            color: var(--neon);
        }
        .nav-item.active svg {
            filter: drop-shadow(0 0 5px var(--neon));
        }

        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="safe-top">

    <header class="p-4 flex justify-between items-center z-50">
        <div class="flex items-center gap-2">
            <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_8px_#3dff7a]"></div>
            <span class="text-[10px] tracking-[0.2em] opacity-50 uppercase" id="current-page-title">Chat</span>
        </div>
        <img src="icon.svg" class="w-6 h-6 opacity-80" alt="logo">
    </header>

    <main class="flex-1 relative px-4 overflow-hidden">
        
        <section id="chat" class="page-section active no-scrollbar">
            <div class="space-y-4 pt-2" id="chat-messages">
                <div class="glass p-4 rounded-2xl border-none bg-white/5">
                    <p class="text-xs opacity-40 mb-1">SYSTEM</p>
                    <p class="text-sm">Vítej v rozhraní Martybot. Jsem připraven k akci.</p>
                </div>
            </div>
            
            <div class="fixed bottom-24 left-4 right-4 z-40">
                <div class="glass p-2 rounded-2xl flex items-center gap-2 border-green-500/30">
                    <input type="text" placeholder="Zadej příkaz..." class="bg-transparent flex-1 p-3 outline-none text-sm">
                    <button class="bg-[#3dff7a] text-black p-3 rounded-xl active:scale-90 transition">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                    </button>
                </div>
            </div>
        </section>

        <section id="dashboard" class="page-section no-scrollbar">
            <div class="grid grid-cols-2 gap-4">
                <div class="glass p-5 rounded-3xl">
                    <p class="text-[10px] opacity-50 mb-2">CPU USAGE</p>
                    <p class="text-2xl font-bold neon-text text-white">12%</p>
                </div>
                <div class="glass p-5 rounded-3xl">
                    <p class="text-[10px] opacity-50 mb-2">RAM</p>
                    <p class="text-2xl font-bold text-white text-white">0.4GB</p>
                </div>
                <div class="glass p-5 rounded-3xl col-span-2">
                    <p class="text-[10px] opacity-50 mb-2">RAILWAY STATUS</p>
                    <div class="flex justify-between items-end">
                        <p class="text-lg text-white">Operational</p>
                        <p class="text-[10px] text-green-400">99.9% Uptime</p>
                    </div>
                </div>
            </div>
        </section>

        <section id="repair" class="page-section no-scrollbar">
            <div class="glass p-6 rounded-3xl space-y-6">
                <h2 class="text-lg font-bold mb-4">Auto-Repair Modul</h2>
                <div class="space-y-4">
                    <button class="w-full glass p-4 rounded-xl text-left flex items-center justify-between border-blue-500/20">
                        <span>Diagnostika kódu</span>
                        <span class="text-[10px] bg-blue-500/20 px-2 py-1 rounded">START</span>
                    </button>
                    <button class="w-full glass p-4 rounded-xl text-left flex items-center justify-between border-yellow-500/20">
                        <span>Fix dependencies</span>
                        <span class="text-[10px] bg-yellow-500/20 px-2 py-1 rounded">RUN</span>
                    </button>
                    <button class="w-full glass p-4 rounded-xl text-left flex items-center justify-between border-red-500/20">
                        <span>Clear Cache</span>
                        <span class="text-[10px] bg-red-500/20 px-2 py-1 rounded">WIPE</span>
                    </button>
                </div>
            </div>
        </section>

        <section id="settings" class="page-section no-scrollbar">
            <div class="space-y-4">
                <div class="glass p-5 rounded-3xl">
                    <label class="text-[10px] opacity-50 block mb-2 uppercase">Railway Backend URL</label>
                    <input type="text" value="https://agent-production.up.railway.app" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl text-xs outline-none focus:border-green-500/50">
                </div>
                <div class="glass p-5 rounded-3xl">
                    <label class="text-[10px] opacity-50 block mb-2 uppercase">Vercel Proxy</label>
                    <div class="flex items-center justify-between">
                        <span class="text-sm">Aktivovat proxy režim</span>
                        <div class="w-10 h-5 bg-green-500/20 rounded-full relative">
                            <div class="absolute right-1 top-1 w-3 h-3 bg-green-500 rounded-full"></div>
                        </div>
                    </div>
                </div>
                <div class="p-4 text-center opacity-20 text-[10px]">
                    MARTYBOT v2.0.4 | GitHub: Martyparty1988
                </div>
            </div>
        </section>

    </main>

    <nav class="glass border-t border-white/5 pb-8 pt-3 px-6 flex justify-between items-center safe-bottom">
        <button onclick="showSection('chat', this)" class="nav-item active flex flex-col items-center gap-1 transition-all">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <span class="text-[9px] font-bold uppercase">Chat</span>
        </button>
        
        <button onclick="showSection('dashboard', this)" class="nav-item flex flex-col items-center gap-1 transition-all">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
            <span class="text-[9px] font-bold uppercase">Stats</span>
        </button>
        
        <button onclick="showSection('repair', this)" class="nav-item flex flex-col items-center gap-1 transition-all">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
            <span class="text-[9px] font-bold uppercase">Servis</span>
        </button>
        
        <button onclick="showSection('settings', this)" class="nav-item flex flex-col items-center gap-1 transition-all">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            <span class="text-[9px] font-bold uppercase">Nastav.</span>
        </button>
    </nav>

    <script>
        // SPA Přepínání sekcí
        function showSection(sectionId, element) {
            // Skrýt všechny sekce
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            
            // Aktivovat vybranou sekci
            document.getElementById(sectionId).classList.add('active');
            
            // Update navigace
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            element.classList.add('active');
            
            // Update titulku v headeru
            const titleMap = {
                'chat': 'Martybot Chat',
                'dashboard': 'System Dashboard',
                'repair': 'Repair & Diagnostics',
                'settings': 'System Settings'
            };
            document.getElementById('current-page-title').innerText = titleMap[sectionId];
            
            // Haptic vibra (pokud podporováno)
            if (window.navigator.vibrate) window.navigator.vibrate(10);
        }

        // PWA Service Worker Registrace
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW failed', err));
            });
        }
    </script>
</body>
</html>
