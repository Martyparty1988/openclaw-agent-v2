<!doctype html><html lang="cs"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#071007"><title>Martybot</title><style>:root{color-scheme:dark;--bg:#071007;--card:rgba(17,27,19,.88);--line:rgba(132,255,171,.22);--text:#effff1;--muted:rgba(239,255,241,.6);--green:#3dff7a;--bad:#ff5d67;--warn:#ffd166;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 20% 0,rgba(61,255,122,.2),transparent 24rem),linear-gradient(180deg,var(--bg),#040704);color:var(--text);padding:env(safe-area-inset-top) 14px max(90px,env(safe-area-inset-bottom))}.app{max-width:860px;margin:auto}.top{position:sticky;top:0;background:linear-gradient(to bottom,rgba(7,16,7,.96),transparent);padding:14px 0;backdrop-filter:blur(14px);z-index:2}.hero{display:flex;justify-content:space-between;align-items:center;gap:12px}.brand{display:flex;gap:12px;align-items:center}.avatar{width:50px;height:50px;border:1px solid var(--line);border-radius:18px;display:grid;place-items:center;font-size:26px;position:relative;background:rgba(61,255,122,.1)}.avatar:after{content:"";position:absolute;right:7px;bottom:7px;width:10px;height:10px;border-radius:50%;background:var(--bad)}.avatar.on:after{background:var(--green)}h1{margin:0;font-size:26px;letter-spacing:-.04em}.sub{color:var(--muted);font-size:13px}.pill{border:1px solid var(--line);border-radius:999px;padding:9px 12px;color:var(--green);background:rgba(61,255,122,.08);font-size:12px;font-weight:800}.pill.bad{color:var(--bad);border-color:rgba(255,93,103,.3);background:rgba(255,93,103,.08)}.pill.warn{color:var(--warn);border-color:rgba(255,209,102,.3);background:rgba(255,209,102,.08)}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:12px 0}.card{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:14px;box-shadow:0 20px 60px rgba(0,0,0,.28)}.mini small{display:block;color:var(--muted);font-size:11px}.mini b{display:block;margin-top:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.chat{height:calc(100vh - 260px);min-height:390px;display:flex;flex-direction:column;overflow:hidden}.msgs{flex:1;overflow:auto;display:flex;flex-direction:column;gap:10px;padding:12px}.msg{max-width:92%;padding:12px 13px;border-radius:18px;white-space:pre-wrap;line-height:1.45}.me{align-self:flex-end;background:var(--green);color:#061006}.bot{align-self:flex-start;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.08)}.sys{align-self:center;color:var(--muted);border:1px dashed rgba(255,255,255,.15);font-size:12px;text-align:center}.bar{display:flex;gap:8px;padding:10px;border-top:1px solid rgba(255,255,255,.08)}input{width:100%;border:1px solid rgba(255,255,255,.13);background:rgba(0,0,0,.3);color:var(--text);padding:13px;border-radius:16px;font:inherit}button{border:1px solid var(--line);background:rgba(61,255,122,.08);color:var(--text);border-radius:16px;padding:11px 12px;font:inherit}.primary{background:var(--green);color:#061006;font-weight:900}.actions{display:flex;gap:8px;overflow:auto;padding:0 0 10px}.actions button{white-space:nowrap}.rows{display:grid;gap:8px}.row{display:flex;justify-content:space-between;gap:10px;padding:9px 10px;border-radius:14px;background:rgba(255,255,255,.05)}.row span:first-child{color:var(--muted)}.ok{color:var(--green)}.bad{color:var(--bad)}.tabbar{position:fixed;left:12px;right:12px;bottom:max(10px,env(safe-area-inset-bottom));display:flex;gap:8px;background:rgba(17,27,19,.9);border:1px solid var(--line);border-radius:24px;padding:8px;backdrop-filter:blur(16px)}.tabbar button{flex:1;padding:10px 6px;font-size:12px}.view{display:none}.view.active{display:block}@media(min-width:800px){.layout{display:grid;grid-template-columns:1fr 310px;gap:12px}.tabbar{display:none}.view{display:block!important}.chat{height:calc(100vh - 210px)}.settings{display:block!important}}</style></head><body><div class="app"><div class="top"><div class="hero"><div class="brand"><div class="avatar" id="avatar">🤖</div><div><h1>Martybot</h1><div class="sub" id="sub">auto diagnostika spojení</div></div></div><button class="pill warn" id="state">Testuji</button></div><div class="grid"><div class="card mini"><small>Backend</small><b id="backend">—</b></div><div class="card mini"><small>Paměť</small><b id="memory">—</b></div></div></div><div class="layout"><main class="view active" id="chatView"><section class="card chat"><div class="msgs" id="msgs"><div class="msg sys">Když přímá Railway URL selže, appka automaticky zkusí Vercel proxy.</div></div><div class="actions"><button data-cmd="/status">Stav</button><button data-cmd="/facts">Paměť</button><button data-cmd="/git">Git</button><button data-cmd="/auto run">Auto audit</button><button id="diag">Diagnostika</button></div><form class="bar" id="form"><input id="input" placeholder="Napiš zprávu nebo příkaz"><button class="primary">Poslat</button></form></section></main><aside class="view settings" id="settingsView"><section class="card"><h3>Nastavení spojení</h3><div class="rows"><input id="url" placeholder="Railway URL volitelně"><input id="tok" placeholder="Web token volitelně" type="password"><button class="primary" id="save">Uložit a test</button><button id="proxy">Použít Vercel proxy</button><button id="testProxy">Test proxy</button></div><p class="sub">Proxy režim vyžaduje ve Vercelu proměnnou AGENT_BACKEND_URL. Přímý režim vyžaduje správné CORS na Railway.</p></section><section class="card"><h3>Detail</h3><div class="rows" id="detail"></div></section></aside></div></div><nav class="tabbar"><button data-tab="chatView">💬 Chat</button><button data-tab="settingsView">⚙️ Nastavení</button></nav><script>const $=id=>document.getElementById(id),msgs=$('msgs');let backendUrl=localStorage.martybotBackendUrl||'',token=localStorage.martybotWebToken||'',mode=localStorage.martybotMode||'auto';$('url').value=backendUrl;$('tok').value=token;function add(t,c='bot'){let e=document.createElement('div');e.className='msg '+c;e.textContent=t;msgs.appendChild(e);msgs.scrollTop=msgs.scrollHeight}function base(){return backendUrl.trim().replace(/\/$/,'')}function hdr(json){let h={};if(json)h['Content-Type']='application/json';if(token)h.Authorization='Bearer '+token;return h}function path(p,m){return m==='direct'&&base()?base()+p:p}function errMsg(e,m){let x=String(e.message||e);if(x.toLowerCase().includes('load failed')||x.toLowerCase().includes('failed to fetch'))return (m==='direct'?'Přímá Railway URL':'Vercel proxy')+': Load failed — špatná URL, CORS, nebo backend neběží.';return (m==='direct'?'Přímá Railway URL':'Vercel proxy')+': '+x}async function jfetch(p,opt={},pref='auto'){let arr=pref==='auto'?(mode==='proxy'?['proxy','direct']:['direct','proxy']):[pref],errs=[];for(let m of arr){if(m==='direct'&&!base())continue;try{let r=await fetch(path(p,m),{...opt,headers:{...(opt.headers||{}),...hdr(!!opt.body)}}),txt=await r.text(),d;try{d=txt?JSON.parse(txt):{}}catch{d={error:txt||'Neplatná odpověď'}}if(!r.ok)throw new Error(d.error||('HTTP '+r.status));mode=m;localStorage.martybotMode=m;return{d,m}}catch(e){errs.push(errMsg(e,m))}}throw new Error(errs.join('\n'))}function val(v){return v===true?'ano':v===false?'ne':(v||'—')}function render(d,m){$('avatar').classList.add('on');$('state').textContent='Online';$('state').className='pill ok';$('backend').textContent=m==='direct'?new URL(base()).host:'Vercel proxy';$('memory').textContent=d.memoryBackend||'—';$('sub').textContent='běží přes '+(m==='direct'?'Railway':'Vercel proxy');let rows=[['Režim',m],['Model',d.model],['Provider',d.provider],['Telegram',d.telegram],['Memory',d.memoryBackend],['Supabase důvod',d.memorySupabaseDisabledReason],['Git',d.gitWorkdir],['Token API',d.webApiToken],['Origins',Array.isArray(d.allowedOrigins)?d.allowedOrigins.join(', '):d.allowedOrigins]];$('detail').innerHTML=rows.map(r=>'<div class="row"><span>'+r[0]+'</span><span>'+val(r[1])+'</span></div>').join('')}async function status(show=false,pref='auto'){try{$('state').textContent='Testuji';$('state').className='pill warn';let {d,m}=await jfetch('/api/status',{},pref);render(d,m);return true}catch(e){$('avatar').classList.remove('on');$('state').textContent='Offline';$('state').className='pill bad';$('detail').innerHTML='<div class="row"><span>Chyba</span><span class="bad">'+e.message.replaceAll('<','&lt;')+'</span></div>';if(show)add('Diagnostika:\n'+e.message+'\n\nRychlé řešení: Nastavení → Použít Vercel proxy. Pokud proxy hlásí AGENT_BACKEND_URL missing, nastav ji ve Vercelu.','sys');return false}}async function send(t){add(t,'me');try{let {d}=await jfetch('/api/chat',{method:'POST',body:JSON.stringify({text:t,userId:'web_user'})});(d.replies?.length?d.replies:['Bez odpovědi']).forEach(x=>add(x,'bot'))}catch(e){add('Chyba spojení:\n'+e.message,'sys')}status(false)}$('form').onsubmit=e=>{e.preventDefault();let t=$('input').value.trim();if(!t)return;$('input').value='';send(t)};document.onclick=e=>{let b=e.target.closest('[data-cmd]');if(b)send(b.dataset.cmd)};$('save').onclick=()=>{backendUrl=$('url').value.trim();token=$('tok').value.trim();localStorage.martybotBackendUrl=backendUrl;localStorage.martybotWebToken=token;add('Uloženo, testuju spojení…','sys');status(true)};$('proxy').onclick=()=>{backendUrl='';$('url').value='';localStorage.martybotBackendUrl='';mode='proxy';localStorage.martybotMode='proxy';add('Přepnuto na Vercel proxy.','sys');status(true,'proxy')};$('testProxy').onclick=()=>status(true,'proxy');$('diag').onclick=()=>status(true,'auto');document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));$(b.dataset.tab).classList.add('active')});try{let saved=localStorage.martybotLastChat;if(saved)msgs.innerHTML=saved}catch{}setInterval(()=>{try{localStorage.martybotLastChat=msgs.innerHTML}catch{}},1500);status(false);</script></body></html>
